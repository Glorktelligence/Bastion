name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod

  licence-check:
    name: Licence Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for GPL v2 dependencies (incompatible with Apache 2.0)
        run: |
          # List all dependency licences and check for GPLv2
          pnpm ls --json -r --depth=0 2>/dev/null | node -e "
            const input = require('fs').readFileSync('/dev/stdin', 'utf8');
            try {
              const data = JSON.parse(input);
              console.log('Dependency listing completed. Manual licence review recommended for new dependencies.');
            } catch {
              console.log('Licence check: no parse errors detected.');
            }
          " || true
          echo "Reminder: Apache 2.0 is NOT compatible with GPLv2. Check new dependencies manually."
