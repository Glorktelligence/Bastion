      - run: node packages/crypto/trace-test.mjs

  test-client-ai:
    name: "Test: AI Client"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
