#!/usr/sbin/nft -f
#
# Bastion AI Client VM — Local nftables Firewall
#
# Defence-in-depth: mirrors OPNSense VLAN 50 rules at the VM level.
# If OPNSense is misconfigured, this is the last line of defence.
#
# Installation:
#   sudo cp ai-client-nftables.conf /etc/nftables.conf
#   sudo systemctl enable nftables
#   sudo systemctl restart nftables
#
# Verify:
#   sudo nft list ruleset
#
# PRINCIPLE: Default deny. Only explicitly permitted traffic flows.
# The AI VM may ONLY communicate with:
#   1. Relay server (10.0.30.10:9443) — WSS
#   2. External HTTPS (port 443) — AI provider APIs
#   3. DNS (port 53) — restricted to gateway resolver only
#   4. Loopback — local process communication
#
# Copyright 2026 Glorktelligence — Harry Smith
# Licensed under the Apache License, Version 2.0

# Flush existing rules
flush ruleset

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
define RELAY_IP     = 10.0.30.10
define RELAY_PORT   = 9443
define GATEWAY_IP   = 10.0.50.1
define LOCAL_NET    = 10.0.0.0/8
define AI_VM_IP     = 10.0.50.10

# ---------------------------------------------------------------------------
# inet filter table
# ---------------------------------------------------------------------------
table inet filter {

    # -----------------------------------------------------------------------
    # Input chain — what can reach this VM
    # -----------------------------------------------------------------------
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback — always allow
        iif "lo" accept

        # Established/related connections — allow return traffic
        ct state established,related accept

        # ICMP — allow ping from gateway only (for health checks)
        ip saddr $GATEWAY_IP icmp type echo-request accept
        ip saddr $GATEWAY_IP icmp type echo-reply accept

        # SSH — allow from gateway ONLY (for emergency maintenance)
        # Comment out in production if not needed
        # ip saddr $GATEWAY_IP tcp dport 22 accept

        # Everything else — DROP (default policy)
        # Log dropped packets for monitoring
        log prefix "[BASTION-AI DROP IN] " drop
    }

    # -----------------------------------------------------------------------
    # Output chain — what this VM can send
    # -----------------------------------------------------------------------
    chain output {
        type filter hook output priority 0; policy drop;

        # Loopback — always allow
        oif "lo" accept

        # Established/related — allow return traffic on accepted connections
        ct state established,related accept

        # RULE 1: Relay WSS — TCP to relay on port 9443
        ip daddr $RELAY_IP tcp dport $RELAY_PORT ct state new accept

        # RULE 2: External HTTPS — TCP port 443 to NON-LOCAL destinations
        # Block HTTPS to internal networks first (prevent lateral movement)
        ip daddr $LOCAL_NET tcp dport 443 log prefix "[BASTION-AI BLOCK INTERNAL HTTPS] " drop
        # Allow HTTPS to external (AI provider APIs)
        tcp dport 443 ct state new accept

        # RULE 3: DNS — UDP port 53 to gateway resolver ONLY
        # Restricted to gateway to prevent DNS exfiltration to arbitrary servers
        ip daddr $GATEWAY_IP udp dport 53 accept

        # ICMP — allow outbound ping to gateway (health checks)
        ip daddr $GATEWAY_IP icmp type echo-request accept

        # Everything else — DROP
        log prefix "[BASTION-AI DROP OUT] " drop
    }

    # -----------------------------------------------------------------------
    # Forward chain — no forwarding (this is an endpoint, not a router)
    # -----------------------------------------------------------------------
    chain forward {
        type filter hook forward priority 0; policy drop;
    }
}

# ---------------------------------------------------------------------------
# Verification commands (run after applying):
#
#   # Check ruleset is loaded
#   sudo nft list ruleset
#
#   # Test relay connection — should succeed
#   nc -zv 10.0.30.10 9443
#
#   # Test external HTTPS — should succeed
#   curl -sI https://api.anthropic.com
#
#   # Test DNS — should succeed (via gateway only)
#   dig @10.0.50.1 api.anthropic.com
#
#   # Test DNS to external — should FAIL
#   dig @8.8.8.8 api.anthropic.com
#
#   # Test internal lateral movement — should FAIL
#   nc -zv 10.0.10.5 22
#   ping 10.0.10.1
#
#   # Test internal HTTPS — should FAIL
#   curl -sI https://10.0.10.5
#
#   # Check dropped packets in journal
#   journalctl -k | grep "BASTION-AI"
# ---------------------------------------------------------------------------
