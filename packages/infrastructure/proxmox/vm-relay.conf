# Bastion Relay Server — Proxmox VM Configuration
#
# VM Name: naval-bastion-01
# VLAN: 30 (DMZ)
# IP: 10.0.30.10/24
# Purpose: Message routing, audit logging, file quarantine
#
# This configuration is for Proxmox VE 8.x.
# Adjust vmid, storage, and bridge names to match your environment.
#
# Usage:
#   qm create 310 --config /path/to/vm-relay.conf
#   # Or import settings manually via the Proxmox web UI
#
# Copyright 2026 Glorktelligence — Harry Smith
# Licensed under the Apache License, Version 2.0

# ---------------------------------------------------------------------------
# VM Identity
# ---------------------------------------------------------------------------
vmid: 310
name: naval-bastion-01
description: Bastion relay server - WSS message routing, audit, quarantine

# ---------------------------------------------------------------------------
# Hardware
# ---------------------------------------------------------------------------
cores: 2
sockets: 1
memory: 2048
balloon: 1024
cpu: host

# OS
ostype: l26

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------
# System disk — Debian 12 minimal
scsi0: local-lvm:vm-310-disk-0,size=20G,ssd=1
# Audit database storage — separate disk for backup isolation
scsi1: local-lvm:vm-310-disk-1,size=10G,ssd=1

scsihw: virtio-scsi-single
boot: order=scsi0

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
# VLAN 30 (DMZ) — relay accessible from user and AI VLANs
net0: virtio,bridge=vmbr0,tag=30,firewall=1

# ---------------------------------------------------------------------------
# Cloud-Init (optional — for automated provisioning)
# ---------------------------------------------------------------------------
# Uncomment to use cloud-init for automated setup:
# ide2: local:cloudinit
# ipconfig0: ip=10.0.30.10/24,gw=10.0.30.1
# nameserver: 10.0.30.1
# searchdomain: bastion.local
# ciuser: bastion
# cipassword: <set-via-proxmox-ui>
# sshkeys: <paste-your-public-key-here>

# ---------------------------------------------------------------------------
# Startup
# ---------------------------------------------------------------------------
onboot: 1
startup: order=2,up=30

# ---------------------------------------------------------------------------
# Firewall (Proxmox-level — supplements OPNSense)
# ---------------------------------------------------------------------------
# Enable Proxmox firewall as additional layer
firewall: 1

# ---------------------------------------------------------------------------
# Post-Installation Steps
# ---------------------------------------------------------------------------
#
# 1. Install Debian 12 minimal (or use cloud image)
#
# 2. Configure static IP:
#    /etc/network/interfaces:
#      auto ens18
#      iface ens18 inet static
#        address 10.0.30.10
#        netmask 255.255.255.0
#        gateway 10.0.30.1
#        dns-nameservers 10.0.30.1
#
# 3. Install Node.js 24:
#    curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
#    apt install -y nodejs
#    corepack enable && corepack prepare pnpm@10 --activate
#
# 4. Create bastion user:
#    useradd -r -m -s /bin/bash bastion
#    mkdir -p /opt/bastion /var/lib/bastion
#    chown bastion:bastion /opt/bastion /var/lib/bastion
#
# 5. Mount audit disk:
#    mkfs.ext4 /dev/sdb
#    echo '/dev/sdb /var/lib/bastion ext4 defaults 0 2' >> /etc/fstab
#    mount -a
#    chown bastion:bastion /var/lib/bastion
#
# 6. Deploy Bastion relay (see docs/guides/deployment.md)
#
# 7. Configure TLS certificates
#
# 8. Start systemd service
