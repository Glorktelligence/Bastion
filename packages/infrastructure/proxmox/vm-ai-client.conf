# Bastion AI Client — Proxmox VM Configuration
#
# VM Name: naval-bastion-ai-01
# VLAN: 50 (Isolated)
# IP: 10.0.50.10/24
# Purpose: Isolated AI execution environment
#
# SECURITY: This VM must be fully isolated. It connects ONLY to:
#   - The relay server (10.0.30.10:9443) via WSS
#   - External AI provider APIs (port 443) via NAT
#   - DNS (port 53)
# It has NO access to internal fleet services, no SSH to other hosts,
# and no lateral movement capability. This is enforced at the firewall level.
#
# Copyright 2026 Glorktelligence — Harry Smith
# Licensed under the Apache License, Version 2.0

# ---------------------------------------------------------------------------
# VM Identity
# ---------------------------------------------------------------------------
vmid: 510
name: naval-bastion-ai-01
description: Bastion AI client - isolated execution environment (VLAN 50)

# ---------------------------------------------------------------------------
# Hardware
# ---------------------------------------------------------------------------
# More resources than relay — AI processing may need memory for large contexts
cores: 4
sockets: 1
memory: 4096
balloon: 2048
cpu: host

# OS
ostype: l26

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------
# System disk — Debian 12 minimal
scsi0: local-lvm:vm-510-disk-0,size=20G,ssd=1
# File handling workspace (intake + outbound staging)
scsi1: local-lvm:vm-510-disk-1,size=20G,ssd=1

scsihw: virtio-scsi-single
boot: order=scsi0

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
# VLAN 50 (Isolated) — strictly controlled by OPNSense rules
net0: virtio,bridge=vmbr0,tag=50,firewall=1

# ---------------------------------------------------------------------------
# Cloud-Init (optional)
# ---------------------------------------------------------------------------
# Uncomment to use cloud-init:
# ide2: local:cloudinit
# ipconfig0: ip=10.0.50.10/24,gw=10.0.50.1
# nameserver: 10.0.50.1
# searchdomain: bastion.local
# ciuser: bastion-ai
# cipassword: <set-via-proxmox-ui>
# sshkeys: <paste-your-public-key-here>

# ---------------------------------------------------------------------------
# Startup
# ---------------------------------------------------------------------------
# Start after relay (order=3, relay is order=2)
onboot: 1
startup: order=3,up=60

# ---------------------------------------------------------------------------
# Firewall (Proxmox-level)
# ---------------------------------------------------------------------------
firewall: 1

# ---------------------------------------------------------------------------
# Post-Installation Steps
# ---------------------------------------------------------------------------
#
# 1. Install Debian 12 minimal (or use cloud image)
#
# 2. Configure static IP:
#    /etc/network/interfaces:
#      auto ens18
#      iface ens18 inet static
#        address 10.0.50.10
#        netmask 255.255.255.0
#        gateway 10.0.50.1
#        dns-nameservers 10.0.50.1
#
# 3. Install Node.js 24:
#    curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
#    apt install -y nodejs
#    corepack enable && corepack prepare pnpm@10 --activate
#
# 4. Create bastion-ai user:
#    useradd -r -m -s /bin/bash bastion-ai
#    mkdir -p /opt/bastion-ai /var/lib/bastion-ai/{intake,outbound}
#    chown -R bastion-ai:bastion-ai /opt/bastion-ai /var/lib/bastion-ai
#
# 5. Mount file workspace disk:
#    mkfs.ext4 /dev/sdb
#    echo '/dev/sdb /var/lib/bastion-ai ext4 defaults 0 2' >> /etc/fstab
#    mount -a
#    chown -R bastion-ai:bastion-ai /var/lib/bastion-ai
#
# 6. Deploy Bastion AI client (see docs/guides/deployment.md)
#
# 7. Store API key in /opt/bastion-ai/.env (chmod 600)
#    NEVER expose the API key outside this VM.
#
# 8. Start systemd service
#
# VERIFICATION:
#   # Confirm isolation — these should ALL fail:
#   ping 10.0.10.1       # Should be unreachable (User VLAN)
#   ssh 10.0.10.5        # Should be unreachable
#   curl http://10.0.30.1  # Should be unreachable (except port 9443)
#
#   # These should succeed:
#   nc -zv 10.0.30.10 9443    # Relay WSS
#   curl https://api.anthropic.com  # AI provider API
