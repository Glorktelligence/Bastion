# Bastion Relay Server — Proxmox LXC Container Configuration
#
# Container Name: naval-bastion-01-lxc
# VLAN: 30 (DMZ)
# IP: 10.0.30.10/24
# Purpose: Lightweight alternative to full VM for the relay server
#
# LXC containers are more resource-efficient than VMs and suitable
# for the relay server since it only runs Node.js (no kernel-level
# isolation needed — the relay doesn't execute untrusted code).
#
# NOTE: Use a full VM (vm-ai-client.conf) for the AI client, not LXC.
# The AI client needs stronger isolation guarantees because it executes
# AI-generated actions.
#
# Copyright 2026 Glorktelligence — Harry Smith
# Licensed under the Apache License, Version 2.0

# ---------------------------------------------------------------------------
# Container Identity
# ---------------------------------------------------------------------------
vmid: 311
hostname: naval-bastion-01-lxc
description: Bastion relay server (LXC) - WSS routing, audit, quarantine

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
cores: 2
memory: 2048
swap: 512

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------
# Root filesystem — Debian 12 template
rootfs: local-lvm:vm-311-disk-0,size=10G

# Mount point for audit database (separate for backup isolation)
mp0: local-lvm:vm-311-disk-1,mp=/var/lib/bastion,size=10G

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
# VLAN 30 (DMZ) with static IP
net0: name=eth0,bridge=vmbr0,tag=30,ip=10.0.30.10/24,gw=10.0.30.1,firewall=1

# ---------------------------------------------------------------------------
# DNS
# ---------------------------------------------------------------------------
nameserver: 10.0.30.1
searchdomain: bastion.local

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
# Unprivileged container (recommended)
unprivileged: 1

# Disable unnecessary features
features: nesting=0

# ---------------------------------------------------------------------------
# Startup
# ---------------------------------------------------------------------------
onboot: 1
startup: order=2,up=30

# ---------------------------------------------------------------------------
# Post-Installation Steps
# ---------------------------------------------------------------------------
#
# 1. Create container from Debian 12 template:
#    pct create 311 local:vztmpl/debian-12-standard_12.x_amd64.tar.zst \
#      --storage local-lvm --rootfs 10 --hostname naval-bastion-01-lxc \
#      --cores 2 --memory 2048 --swap 512 --unprivileged 1 \
#      --net0 name=eth0,bridge=vmbr0,tag=30,ip=10.0.30.10/24,gw=10.0.30.1,firewall=1 \
#      --nameserver 10.0.30.1 --onboot 1 --start 1
#
# 2. Enter container:
#    pct enter 311
#
# 3. Install Node.js 24:
#    curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
#    apt install -y nodejs openssl
#    corepack enable && corepack prepare pnpm@10 --activate
#
# 4. Create bastion user:
#    useradd -r -m -s /bin/bash bastion
#    chown bastion:bastion /var/lib/bastion
#
# 5. Deploy Bastion relay (see docs/guides/deployment.md)
#
# 6. Add additional mount point for audit storage:
#    pct set 311 -mp0 local-lvm:10,mp=/var/lib/bastion
#
# 7. Configure TLS and start systemd service
