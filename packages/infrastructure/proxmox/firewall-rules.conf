# OPNSense Firewall Rules — Bastion Naval Fleet Topology
#
# Firewall: Mystic (OPNSense 24.x)
# Purpose: Inter-VLAN routing rules for Bastion deployment
#
# This file documents the required firewall rules for a Bastion deployment
# on the Glorktelligence Naval Fleet infrastructure. Import these rules
# into OPNSense via Firewall > Rules, or use as a reference for manual
# configuration.
#
# VLAN Layout:
#   VLAN 10 (User)     — 10.0.10.0/24 — Human clients (desktop, mobile)
#   VLAN 30 (DMZ)      — 10.0.30.0/24 — Bastion relay server
#   VLAN 50 (Isolated) — 10.0.50.0/24 — AI client VM
#
# Principle: Default deny. Only explicitly permitted traffic flows.
# The AI VM has the most restrictive rules — no lateral movement.
#
# Copyright 2026 Glorktelligence — Harry Smith
# Licensed under the Apache License, Version 2.0

# ===========================================================================
# VLAN 10 (User) — Interface: VLAN10
# ===========================================================================
# Human clients connect to the relay. No direct AI VM access.

# Allow: User → Relay WSS (port 9443)
[rule]
interface = VLAN10
direction = in
action = pass
protocol = tcp
source = VLAN10 net
destination = 10.0.30.10
destination_port = 9443
description = Bastion: Human client → Relay WSS

# Allow: User → Relay Admin (port 9444) — optional, for SSH tunnel access
[rule]
interface = VLAN10
direction = in
action = pass
protocol = tcp
source = VLAN10 net
destination = 10.0.30.10
destination_port = 9444
description = Bastion: Admin panel access (via SSH tunnel)

# Block: User → AI VM — no direct access
[rule]
interface = VLAN10
direction = in
action = block
protocol = any
source = VLAN10 net
destination = VLAN50 net
description = Bastion: Block user → AI VM (no direct access)
log = yes

# ===========================================================================
# VLAN 30 (DMZ) — Interface: VLAN30
# ===========================================================================
# The relay accepts inbound connections but does NOT initiate outbound
# connections to other VLANs. WebSocket is bidirectional over a single
# TCP connection, so responses flow over established connections.

# Block: Relay → User VLAN (no initiation)
[rule]
interface = VLAN30
direction = in
action = block
protocol = any
source = VLAN30 net
destination = VLAN10 net
description = Bastion: Block relay → User VLAN initiation
log = yes

# Block: Relay → AI VLAN (no initiation)
[rule]
interface = VLAN30
direction = in
action = block
protocol = any
source = VLAN30 net
destination = VLAN50 net
description = Bastion: Block relay → AI VLAN initiation
log = yes

# ===========================================================================
# VLAN 50 (Isolated) — Interface: VLAN50
# ===========================================================================
# MOST RESTRICTIVE. AI VM connects to relay and external AI APIs only.
# No internal fleet access. No lateral movement.

# Allow: AI VM → Relay WSS (port 9443)
[rule]
interface = VLAN50
direction = in
action = pass
protocol = tcp
source = 10.0.50.10
destination = 10.0.30.10
destination_port = 9443
description = Bastion: AI client → Relay WSS

# Allow: AI VM → External HTTPS (port 443) — AI provider APIs
[rule]
interface = VLAN50
direction = in
action = pass
protocol = tcp
source = 10.0.50.10
destination = any
destination_port = 443
description = Bastion: AI client → External AI APIs (HTTPS)

# Allow: AI VM → DNS (port 53) — name resolution for API endpoints
[rule]
interface = VLAN50
direction = in
action = pass
protocol = udp
source = 10.0.50.10
destination = any
destination_port = 53
description = Bastion: AI client → DNS resolution

# Block: AI VM → User VLAN — no lateral movement
[rule]
interface = VLAN50
direction = in
action = block
protocol = any
source = VLAN50 net
destination = VLAN10 net
description = Bastion: Block AI → User VLAN (isolation)
log = yes

# Block: AI VM → Internal networks — no fleet access
[rule]
interface = VLAN50
direction = in
action = block
protocol = any
source = VLAN50 net
destination = 10.0.0.0/8
description = Bastion: Block AI → Internal networks (isolation)
log = yes

# Note: The "AI → Internal" block rule is placed AFTER the relay allow rule.
# OPNSense evaluates rules top-to-bottom, first match wins.
# The relay (10.0.30.10) is within 10.0.0.0/8, so the specific allow rule
# for port 9443 must come before this catch-all block.

# ===========================================================================
# NAT Rules
# ===========================================================================
# The AI VM needs outbound NAT to reach external AI provider APIs.

# Outbound NAT: AI VM → WAN (for HTTPS to AI providers)
[nat]
interface = WAN
type = outbound
source = VLAN50 net
destination = any
destination_port = 443
translation = interface address
description = Bastion: AI VM outbound NAT for AI provider APIs

# Outbound NAT: AI VM → WAN (for DNS)
[nat]
interface = WAN
type = outbound
source = VLAN50 net
destination = any
destination_port = 53
translation = interface address
description = Bastion: AI VM outbound NAT for DNS

# ===========================================================================
# Anti-Lockout Rules
# ===========================================================================
# Ensure management access to OPNSense is preserved.

# Allow: Management → OPNSense web UI
[rule]
interface = VLAN10
direction = in
action = pass
protocol = tcp
source = VLAN10 net
destination = OPNSense
destination_port = 443
description = Anti-lockout: Management → OPNSense web UI

# Allow: Management → OPNSense SSH
[rule]
interface = VLAN10
direction = in
action = pass
protocol = tcp
source = VLAN10 net
destination = OPNSense
destination_port = 22
description = Anti-lockout: Management → OPNSense SSH

# ===========================================================================
# Verification Commands
# ===========================================================================
#
# Run these from each VLAN to verify rules are working:
#
# From User VLAN (10.0.10.x):
#   nc -zv 10.0.30.10 9443   # Should succeed (relay WSS)
#   nc -zv 10.0.50.10 22     # Should fail (AI VM blocked)
#   ping 10.0.50.10           # Should fail (AI VM blocked)
#
# From AI VM (10.0.50.10):
#   nc -zv 10.0.30.10 9443   # Should succeed (relay WSS)
#   curl https://api.anthropic.com  # Should succeed (external API)
#   ping 10.0.10.1            # Should fail (user VLAN blocked)
#   ssh 10.0.10.5             # Should fail (no lateral movement)
#   nc -zv 10.0.30.10 22     # Should fail (only port 9443 allowed)
#
# From Relay (10.0.30.10):
#   # WebSocket connections are bidirectional over established TCP.
#   # The relay does NOT need to initiate new connections to clients.
#   nc -zv 10.0.10.5 22      # Should fail (no outbound to user VLAN)
#   nc -zv 10.0.50.10 22     # Should fail (no outbound to AI VLAN)
