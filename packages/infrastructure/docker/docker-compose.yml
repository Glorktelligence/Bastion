# Bastion Development Environment — Docker Compose
#
# Spins up the relay, a mock AI client, and all dependencies
# for local development and testing.
#
# Usage:
#   docker compose up          # Start all services
#   docker compose up -d       # Start in background
#   docker compose logs -f     # Follow logs
#   docker compose down        # Stop and remove containers
#
# Copyright 2026 Glorktelligence — Harry Smith
# Licensed under the Apache License, Version 2.0

services:
  # --------------------------------------------------------------------------
  # Bastion Relay Server
  # --------------------------------------------------------------------------
  relay:
    build:
      context: ../../..
      dockerfile: packages/infrastructure/docker/relay.Dockerfile
    ports:
      - "9443:9443"   # WSS relay
      - "9444:9444"   # Admin panel (localhost only in production)
    environment:
      BASTION_RELAY_PORT: "9443"
      BASTION_RELAY_HOST: "0.0.0.0"
      BASTION_JWT_SECRET: "${BASTION_JWT_SECRET:?Set BASTION_JWT_SECRET in .env}"
      BASTION_JWT_ISSUER: "bastion-relay"
      BASTION_JWT_AUDIENCE: "bastion-client"
      BASTION_ADMIN_PORT: "9444"
      BASTION_ADMIN_HOST: "0.0.0.0"  # Accessible within Docker network
      BASTION_AUDIT_RETENTION_DAYS: "365"
    volumes:
      - relay-data:/var/lib/bastion
      - relay-certs:/etc/bastion/certs
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection({port:9443}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      bastion-net:
        ipv4_address: 172.28.0.10
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Bastion AI Client (Mock Provider)
  # --------------------------------------------------------------------------
  ai-client:
    build:
      context: ../../..
      dockerfile: packages/infrastructure/docker/ai-client.Dockerfile
    environment:
      BASTION_RELAY_URL: "wss://relay:9443"
      BASTION_AI_CLIENT_ID: "ai-client-dev-001"
      BASTION_AI_DISPLAY_NAME: "Claude (Development)"
      BASTION_PROVIDER_ID: "anthropic-dev"
      # Mock provider — no real API key needed for development
      BASTION_MOCK_PROVIDER: "true"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"  # Accept self-signed certs in dev
    volumes:
      - ai-intake:/var/lib/bastion-ai/intake
      - ai-outbound:/var/lib/bastion-ai/outbound
    depends_on:
      relay:
        condition: service_healthy
    networks:
      bastion-net:
        ipv4_address: 172.28.0.20
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Bastion Relay Admin UI (SvelteKit)
  # --------------------------------------------------------------------------
  admin-ui:
    build:
      context: ../../..
      dockerfile: packages/infrastructure/docker/admin-ui.Dockerfile
    ports:
      - "5174:5174"
    environment:
      BASTION_ADMIN_API_URL: "https://relay:9444"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    depends_on:
      relay:
        condition: service_healthy
    networks:
      bastion-net:
        ipv4_address: 172.28.0.30
    restart: unless-stopped

volumes:
  relay-data:
    driver: local
  relay-certs:
    driver: local
  ai-intake:
    driver: local
  ai-outbound:
    driver: local

networks:
  bastion-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
