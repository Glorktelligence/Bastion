<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui; color: #e0e0e0; background: transparent; padding: 12px; margin: 0; }
    h3 { font-size: 14px; margin: 0 0 8px; color: #22c55e; }
    .outcome { padding: 6px 8px; border-left: 3px solid #22c55e; margin-bottom: 6px; font-size: 13px; background: rgba(34,197,94,0.05); }
    .turn-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .empty { color: #555; font-size: 13px; text-align: center; padding: 16px; }
  </style>
</head>
<body>
  <h3>Turn Results</h3>
  <div id="results"><p class="empty">Waiting for turn results...</p></div>

  <script>
    // Listen for turn results through the Bastion bridge
    window.bastion.on('game:turn_result', function(payload) {
      var container = document.getElementById('results');
      container.innerHTML = '';

      var label = document.createElement('div');
      label.className = 'turn-label';
      label.textContent = 'Turn ' + payload.turnNumber + ' Results';
      container.appendChild(label);

      payload.outcomes.forEach(function(outcome) {
        var div = document.createElement('div');
        div.className = 'outcome';
        div.textContent = outcome;
        container.appendChild(div);
      });
    });
  </script>
</body>
</html>
